<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objetivos dos Labs | CEST</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/paginas.css">
    
</head>

<body>

<header class="labs-header">
    <div class="header-left">
        <a href="home.html" class="back-icon" title="Voltar">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h1>Projetos dos Labs</h1>
    </div>
    <div class="logo">CEST</div>
</header>

<main>
<section class="projects-container">

    <!-- PROJETO 1 -->
    <div class="labs-container">

    <div class="lab-card">
        <h3>Sistema de Gestão Acadêmica</h3>
        <p>Desenvolvimento de plataforma para gestão de cursos e alunos</p>

        <div class="lab-footer">
            <span class="status andamento">Em andamento</span>
            <button>Saiba Mais</button>
        </div>
    </div>

    <div class="lab-card">
        <h3>App de Sustentabilidade</h3>
        <p>Aplicativo para conscientização ambiental no campus</p>

        <div class="lab-footer">
            <span class="status concluido">Concluído</span>
            <button>Saiba Mais</button>
        </div>
    </div>

    <div class="lab-card">
        <h3>Portal do Empreendedor</h3>
        <p>Plataforma de apoio a startups estudantis</p>

        <div class="lab-footer">
            <span class="status andamento">Em andamento</span>
            <button>Saiba Mais</button>
        </div>
    </div>

</div>

</section>
</main>

<script>
const cards = document.querySelectorAll(".lab-card");

cards.forEach(card => {
    const button = card.querySelector("button");

    // Clique no botão
    button.addEventListener("click", (e) => {
        e.stopPropagation();

        // Remove seleção de todos
        cards.forEach(c => c.classList.remove("active"));

        // Ativa o clicado
        card.classList.add("active");

        // Simula ação (pode trocar depois por modal ou página)
        alert("Mais detalhes sobre: " + card.querySelector("h3").innerText);
    });

    // Clique no card inteiro
    card.addEventListener("click", () => {
        cards.forEach(c => c.classList.remove("active"));
        card.classList.add("active");
    });

    // Efeito hover com JS (extra)
    card.addEventListener("mouseenter", () => {
        card.style.transform = "translateY(-5px)";
    });

    card.addEventListener("mouseleave", () => {
        card.style.transform = "translateY(0)";
    });
});
</script>
</body>
</html>
