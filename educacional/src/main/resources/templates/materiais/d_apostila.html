<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostilas - CEST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/cssDidaticos/d_apostila.css}">
</head>
<body>

    <header class="navbar">
        <div class="nav-content">
            <a th:href="@{/didatico}" class="nav-left">
                <i class="fas fa-chevron-left"></i>
                <span>Apostilas e E-books</span>
            </a>
            <div class="logo-box">CEST</div>
        </div>
    </header>

    <main class="main-container">
        <div class="article-list">
        </div>
    </main>

    <button class="btn-fab" id="btnOpen">
        <i class="fas fa-plus"></i>
    </button>

    <div class="modal-overlay" id="modalContainer">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Adicionar Apostila</h3>
                <button class="btn-close" id="btnClose">&times;</button>
            </div>
            
            <form class="modal-body" id="formMaterial">
                <div class="input-group">
                    <label>Título da Apostila</label>
                    <input type="text" id="titulo" placeholder="Ex: Apostila Módulo 01" required>
                </div>

                <div class="input-group">
                    <label>Observações</label>
                    <textarea id="observacoes" rows="3" placeholder="Informações adicionais para os alunos..."></textarea>
                </div>

                <div class="upload-section">
                    <div class="upload-wrapper">
                        <div class="upload-circle">
                            <i class="fas fa-upload"></i>
                        </div>
                        <p>Selecione o arquivo da apostila</p>
                        <input type="file" id="arquivoInput" class="hidden-file-input">
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="btnCancel">Cancelar</button>
                    <button type="submit" class="btn-primary">Enviar Material</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" th:inline="javascript">
        import { configurarFirebase } from './js/upload-material.js';

        // Captura as variáveis do Java/Thymeleaf
        const config = {
            apiKey: [[${firebase.apiKey}]],
            authDomain: [[${firebase.authDomain}]],
            projectId: [[${firebase.projectId}]],
            storageBucket: [[${firebase.storageBucket}]],
            messagingSenderId: [[${firebase.messagingSenderId}]],
            appId: [[${firebase.appId}]]
        };

        // Inicializa a lógica externa
        configurarFirebase(config);

        // Lógica do Modal (pode continuar aqui ou também ir para um JS de UI)
        document.addEventListener('DOMContentLoaded', () => {
        const modal = document.getElementById('modalContainer');
        const btnOpen = document.getElementById('btnOpen');
        const btnClose = document.getElementById('btnClose');
        const btnCancel = document.getElementById('btnCancel');

        if (btnOpen && modal) {
               btnOpen.onclick = () => {
                    modal.classList.add('active');
                };

                const hideModal = () => {
                    modal.classList.remove('active');
                };

                btnClose.onclick = hideModal;
                btnCancel.onclick = hideModal;

                // Fecha se clicar fora da caixa branca
                window.onclick = (event) => {
                    if (event.target == modal) hideModal();
                };
            } else {
                console.error("Botão btnOpen ou modalContainer não encontrados no HTML!");
            }
        });
    </script>
</body>
</html>
