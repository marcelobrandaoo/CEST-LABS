<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videoaulas - CEST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/cssDidaticos/d_videoaula.css}">
</head>
<body>

    <header class="navbar">
        <div class="nav-content">
            <a th:href="@{/didatico}" class="nav-left">
                <i class="fas fa-chevron-left"></i>
                <span>Videoaulas Gravadas</span>
            </a>
            <div class="logo-box">CEST</div>
        </div>
    </header>

    <main class="main-container">
        <div class="article-list">
            
            <div class="article-item">
                <div class="item-icon-circle" style="background-color: #ea4335;"> <i class="fas fa-play"></i>
                </div>
                <div class="item-info">
                    <span class="item-name">Aula 01 - Introdução à Metodologia</span>
                    <span class="item-meta">Vídeo • 10 de Mar.</span>
                </div>
                <div class="item-options"><i class="fas fa-ellipsis-v"></i></div>
            </div>

            <div class="article-item">
                <div class="item-icon-circle" style="background-color: #ea4335;">
                    <i class="fas fa-play"></i>
                </div>
                <div class="item-info">
                    <span class="item-name">Aula 02 - Estrutura do Projeto</span>
                    <span class="item-meta">Vídeo • 15 de Mar.</span>
                </div>
                <div class="item-options"><i class="fas fa-ellipsis-v"></i></div>
            </div>

        </div>
    </main>

    <button class="btn-fab" id="btnOpen">
        <i class="fas fa-plus"></i>
    </button>

    <div class="modal-overlay" id="modalContainer">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Adicionar Videoaula</h3>
                <button class="btn-close" id="btnClose">&times;</button>
            </div>
            
            <form class="modal-body">
                <div class="input-group">
                    <label>Título da Aula</label>
                    <input type="text" placeholder="Ex: Aula 03 - Revisão" required>
                </div>

                <div class="input-group">
                    <label>Link do Vídeo (YouTube/Drive)</label>
                    <input type="url" placeholder="https://youtube.com/..." required>
                </div>

                <div class="input-group">
                    <label>Comentários Complementares</label>
                    <textarea rows="2" placeholder="O que será abordado neste vídeo?"></textarea>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="btnCancel">Cancelar</button>
                    <button type="submit" class="btn-primary">Adicionar Vídeo</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const modal = document.getElementById('modalContainer');
        const btnOpen = document.getElementById('btnOpen');
        const btnClose = document.getElementById('btnClose');
        const btnCancel = document.getElementById('btnCancel');

        btnOpen.onclick = () => modal.classList.add('active');
        const hideModal = () => modal.classList.remove('active');
        btnClose.onclick = hideModal;
        btnCancel.onclick = hideModal;

        window.onclick = (event) => { if (event.target == modal) hideModal(); }
    </script>
</body>
</html>
