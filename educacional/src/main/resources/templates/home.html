<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escritório Escola - CEST</title>
    <link rel="stylesheet" th:href="@{/css/style-geral.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
</head>
<body>

   

    <main>
        <h1>Escritório Escola</h1>

        <div class="grid-container">
            <a href="@{/projetos}" class="card">
    <div class="card-icon"><i class="fa-solid fa-flask"></i></div>
    <div class="card-title">Projetos dos labs</div>
        </a>

        <a th:href="@{/responsaveis}" class="card">
            <div class="card-icon"><i class="fa-solid fa-users"></i></div>
            <div class="card-title">Responsáveis</div>
        </a>

        <a th:href="@{/objetivos}" class="card">
            <div class="card-icon"><i class="fa-solid fa-bullseye"></i></div>
            <div class="card-title">Objetivos</div>
        </a>

        <a th:href="@{/indicacao}" class="card">
            <div class="card-icon"><i class="fa-solid fa-clipboard-list"></i></div>
            <div class="card-title">Formulário de indicação</div>
        </a>

        <a th:href="@{/didatico}" id="card-material-didatico" style="display: none;" class="card">
            <div class="card-icon"><i class="fa-solid fa-book"></i></div>
            <div class="card-title">Material didático</div>
        </a>

        <a th:href="@{/login}" class="card">
            <div class="card-icon"><i class="fa-solid fa-lock"></i></div>
            <div class="card-title">Sistema Interno</div>
        </a>
        </div>
    </main>

    <script type="module" th:inline="javascript">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: [[${firebase.apiKey}]],
          authDomain: [[${firebase.authDomain}]],
          projectId: [[${firebase.projectId}]],
          storageBucket: [[${firebase.storageBucket}]],
          messagingSenderId: [[${firebase.messagingSenderId}]],
          appId: [[${firebase.appId}]]
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // O 'onAuthStateChanged' escuta se existe um usuário logado no navegador
        onAuthStateChanged(auth, (user) => {
          const cardMaterial = document.getElementById('card-material-didatico');

          if (user) {
            // Se o usuário existir (logado), mostramos o card
            cardMaterial.style.display = 'block';
            console.log("Usuário logado:", user.email);
          } else {
            // Se não houver usuário, garantimos que o card fique escondido
            cardMaterial.style.display = 'none';
            console.log("Nenhum usuário logado.");
          }
        });
    </script>

</body>
</html>
