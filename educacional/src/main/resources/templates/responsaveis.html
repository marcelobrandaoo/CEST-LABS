<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsáveis pelos Labs - CEST</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/style-geral.css}">
    <link rel="stylesheet" th:href="@{/css/paginas.css}">
</head>

<body>

<header class="labs-header">
    <div class="header-left">
        <a th:href="@{/}" class="back-icon" title="Voltar">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h1>Responsáveis por Cada Lab</h1>
    </div>
</header>

<main class="team-page">
    <div class="team-container">

        <div class="team-card">
            <div class="avatar">
                <i class="fas fa-user"></i>
            </div>
            <h3>Prof. Dr. João Silva</h3>
            <p>Coordenador Geral</p>
            <i class="fas fa-envelope email-icon" title="Enviar e-mail"></i>
        </div>

        <div class="team-card">
            <div class="avatar">
                <i class="fas fa-user"></i>
            </div>
            <h3>Prof. Dra. Maria Santos</h3>
            <p>Lab de Inovação</p>
            <i class="fas fa-envelope email-icon" title="Enviar e-mail"></i>
        </div>

        <div class="team-card">
            <div class="avatar">
                <i class="fas fa-user"></i>
            </div>
            <h3>Prof. Dr. Carlos Lima</h3>
            <p>Lab de Pesquisa</p>
            <i class="fas fa-envelope email-icon" title="Enviar e-mail"></i>
        </div>

    </div>
</main>

</body>
</html>
